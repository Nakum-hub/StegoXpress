name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements.txt
      - name: ruff check
        run: ruff check core/ transport/ utils/ main.py tests/
      - name: mypy
        run: mypy core/ transport/ utils/ main.py --ignore-missing-imports

  audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Install project dependencies
        run: pip install -r requirements.txt
      - name: Audit
        run: pip-audit --require-hashes -r requirements.txt || pip-audit -r requirements.txt

  test:
    name: Tests — Python ${{ matrix.python-version }} / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install all dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov "qrcode[pil]"

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short --cov=core --cov=transport --cov=utils --cov-report=term-missing

      - name: Smoke-test CLI encode → decode roundtrip
        shell: bash
        run: |
          python main.py encode \
            --image assets/logo.png \
            --message "CI smoke test" \
            --output /tmp/ci_stego.png \
            --password "ci-test-password-2026!"
          python main.py decode \
            --image /tmp/ci_stego.png \
            --password "ci-test-password-2026!"

      - name: Smoke-test CLI seal mode
        shell: bash
        run: |
          python main.py encode \
            --image assets/logo.png \
            --message "sealed payload" \
            --output /tmp/ci_sealed.png \
            --password "ci-test-password-2026!" \
            --seal
          python main.py decode \
            --image /tmp/ci_sealed.png \
            --password "ci-test-password-2026!" \
            --verify-seal

      - name: Smoke-test CLI adaptive mode
        shell: bash
        run: |
          python main.py encode \
            --image assets/logo.png \
            --message "adaptive test" \
            --output /tmp/ci_adaptive.png \
            --password "ci-test-password-2026!" \
            --adaptive
          python main.py decode \
            --image /tmp/ci_adaptive.png \
            --password "ci-test-password-2026!"

      - name: Verify import health
        run: |
          python -c "from core.lsb_engine import LSBEngine; print('LSBEngine OK')"
          python -c "from core.vault_engine import VaultEngine; print('VaultEngine OK')"
          python -c "from core.shamir_engine import ShamirEngine; print('ShamirEngine OK')"
          python -c "from core.audio_engine import AudioEngine; print('AudioEngine OK')"
          python -c "from core.png_chunk_engine import PngChunkEngine; print('PngChunkEngine OK')"
          python -c "from core.shield_engine import ShieldEngine; print('ShieldEngine OK')"
          python -c "from transport.key_manager import KeyManager; print('KeyManager OK')"
          python -c "from utils.config import Config; print('Config OK')"
