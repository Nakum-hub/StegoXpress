<svg viewBox="0 0 800 500" width="800" height="500" xmlns="http://www.w3.org/2000/svg" role="img">
<title>StegoXpress Logo</title>
<defs>
  <pattern id="dotbg" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
    <circle cx="11" cy="11" r="0.8" fill="#1a2e42"/>
  </pattern>
  <pattern id="pixgrid" x="0" y="0" width="13" height="13" patternUnits="userSpaceOnUse">
    <rect x="1.5" y="1.5" width="10" height="10" fill="#00ffe5" opacity="0.13" rx="1.5"/>
  </pattern>
  <radialGradient id="irisL" cx="42%" cy="42%" r="58%">
    <stop offset="0%" stop-color="#0d2240"/>
    <stop offset="45%" stop-color="#0a1a32"/>
    <stop offset="100%" stop-color="#06101e"/>
  </radialGradient>
  <radialGradient id="pupilG" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#010305"/>
    <stop offset="100%" stop-color="#04080f"/>
  </radialGradient>
  <clipPath id="eyeClip">
    <path d="M120,225 C270,95 530,95 680,225 C530,355 270,355 120,225Z"/>
  </clipPath>
  <filter id="softglow">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
</defs>

