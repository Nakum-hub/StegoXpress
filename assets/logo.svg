<path d="M210,262 C260,282 320,292 380,295" stroke="#00ffe5" stroke-width="1.2" fill="none" opacity="0.22"/>

<!-- ═══════════════ WORDMARK ═══════════════
     Three separate <text> elements at pixel-perfect x positions.
     Positions measured empirically: char width = 27.6px at font-size 46.
     STEGO starts at x=248, X at x=386, PRESS at x=414.
     All use text-anchor="start" so position is independent of each other.
-->
<text x="248" y="386"
      font-family="monospace" font-size="46" font-weight="700"
      text-anchor="start" fill="#c8dae8">STEGO</text>

<text x="386" y="386"
      font-family="monospace" font-size="46" font-weight="700"
      text-anchor="start" fill="#00ffe5">X</text>

<text x="414" y="386"
      font-family="monospace" font-size="46" font-weight="700"
      text-anchor="start" fill="#c8dae8">PRESS</text>

<!-- Tagline — single text element, centered -->
<text x="400" y="418"
      text-anchor="middle"
      font-family="monospace" font-size="11"
      fill="#2e5068" letter-spacing="4">HIDDEN  ·  ENCRYPTED  ·  UNSTOPPABLE</text>
