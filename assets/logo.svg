<!-- Eye outline stroke on top -->
<path d="M120,225 C270,95 530,95 680,225 C530,355 270,355 120,225Z"
      fill="none" stroke="#00ffe5" stroke-width="2.5" opacity="0.9"/>

<!-- Centre dividing line — vertical seam through pupil -->
