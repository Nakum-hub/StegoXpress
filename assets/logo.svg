      font-size="46" font-weight="700" letter-spacing="5">
  <tspan fill="#c8dae8">STEGO</tspan><tspan fill="#00ffe5">X</tspan><tspan fill="#c8dae8">PRESS</tspan>
</text>

<!-- Diamond mark after name -->
<text x="400" y="432" text-anchor="middle"
      font-family="'Courier New',monospace" font-size="11"
      fill="#00ffe5" opacity="0.55" letter-spacing="1">◈</text>

<!-- Tagline -->
<text x="400" y="454" text-anchor="middle"
      font-family="'Courier New','Consolas',monospace"
      font-size="10" fill="#2a4558" letter-spacing="5">
  HIDDEN · ENCRYPTED · UNSTOPPABLE
</text>

<!-- Corner binary accent marks -->
<text x="38" y="488" font-family="monospace" font-size="9" fill="#1a3245" opacity="0.8">01001000 01001001 01000100 01000101</text>
<text x="762" y="488" text-anchor="end" font-family="monospace" font-size="9" fill="#1a3245" opacity="0.8">01000101 01001110 01000011</text>

