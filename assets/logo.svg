<rect x="680" y="18" width="90" height="20" fill="#0e1b26" rx="4"/>
<text x="725" y="32" text-anchor="middle" font-family="monospace" font-size="9" fill="#00ffe5" letter-spacing="2">v2.0 ◈</text>

