<path d="M400,205 L412,225 L400,245Z" fill="#00ffe5" opacity="0.92"/>
<!-- Diamond centre dot -->
<circle cx="400" cy="225" r="4.5" fill="#00ffe5"/>
<circle cx="400" cy="225" r="2.2" fill="white"/>

<!-- Eyelid edge glints -->
<path d="M200,166 C240,148 290,138 340,135" stroke="#00ffe5" stroke-width="1.2" fill="none" opacity="0.35"/>
<path d="M200,284 C240,302 290,312 340,315" stroke="#00ffe5" stroke-width="1.2" fill="none" opacity="0.25"/>

<!-- === WORDMARK === -->
<!-- Main name -->
